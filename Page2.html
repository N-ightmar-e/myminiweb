<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>멀티미디어과 선배에게 문의하기</title>
</head>
<body>
    <h2>멀티미디어과 선배에게 문의하기</h2>
    <p>수업, 과제, 진로, 동아리 등 궁금한 내용을 남겨보세요.</p>

    <form>
        <div>
            <label for="name">이름</label>
            <input type="text" name="name" placeholder="이름을 입력하세요.">
        </div>

        <div>
            <label for="student_id">학번</label>
            <input type="text" name="student_id" placeholder="예:20261234">
        </div>

        <div>
            <label for="grade">학년</label>
            <select name="grade">
                <option value="">선택하세요.</option>
                <option value="1">1학년</option>
                <option value="2">2학년</option>
                <option value="3">3학년</option>
                <option value="4">4학년</option>
            </select>
        </div>

        <div>
            <label for="email">연락처(이메일)</label>
            <input type="email" name="email" placeholder="예:example@email.com">
        </div>

        <div>
            <label for="phone">연락처(전화번호)</label>
            <input type="tel" name="phone" placeholder="예:010-2345-6789">
        </div>

        <div>
            <label for="category">문의 분야</label>
            <select name="category">
                <option value="">선택하세요.</option>
                <option value="class">수업</option>
                <option value="assignment">과제</option>
                <option value="portfolio">포트폴리오</option>
                <option value="career">진로</option>
                <option value="club">동아리</option>
            </select>
        </div>

        <div>
            <span>답변 받고 싶은 방법</span><br>
            <input type="radio" name="reply_method" value="kakaotalk"> 카카오톡
            <input type="radio" name="reply_method" value="email"> 이메일
            <input type="radio" name="reply_method" value="meet"> 직접 만나서
        </div>

        <div>
            <label for="title">문의 제목</label>
            <input type="text" name="title" placeholder="예: 포트폴리오 준비 방법">
        </div>

        <div>
            <label for="content">문의 내용</label><br>
            <textarea name="content" rows="5" cols="40" placeholder="궁금한 내용을 자세히 작성하세요."></textarea>
        </div>

        <div>
            <label for="file">첨부 파일</label>
            <input type="file" name="file">
        </div>

        <div>
            <input type="checkbox" name="agree">
            <label for="agree">개인정보 수집 및 이용에 동의합니다.</label>
        </div>

        <div>
            <button type="submit">문의 보내기</button>
            <button type="reset">다시 쓰기</button>
        </div>
    </form>
</body>
</html>
